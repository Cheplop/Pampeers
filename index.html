<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pampeers</title>
    <link rel="icon" type="image/x-icon" href="assets/pampeerlogo.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Ribeye&display=swap" rel="stylesheet">    
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">    

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container-fluid main-container p-0">
        <div class="row g-0 h-100">

            <!-- LEFT HERO -->
            <div class="col-md-7 left-side d-flex flex-column justify-content-between">
                <div class="my-background"></div>
                <div class="hero-content p-2">
                    <div class="d-flex align-items-center gap-2 mb-0">
                        <img src="assets/pampeerlogo.png" alt="Pampeer Logo" class="logo">
                        <h1 class="mb-0">Pampeers</h1>
                    </div>
                    <p>Hire a babysitter right at your hand!</p>
                </div>

                <ul class="list-inline d-flex justify-content-end gap-5 mb-0">
                    <li class="list-inline-item">Trusted and Verified Sitters</li>
                    <li class="list-inline-item">Easy Booking Process</li>
                    <li class="list-inline-item">24/7 Customer Support</li>
                </ul>         
            </div>

            <!-- RIGHT LOGIN -->
            <div class="col-md-5 right-side d-flex align-items-center justify-content-center">
                <div class="login-panel">
                    <h4>LOGIN</h4>

                   <div class="input-group mb-3">
                        <span class="input-group-text">@</span>
                        <div class="form-floating">
                            <input type="text" class="form-control" id="floatingInputGroup1" placeholder="Username">
                            <label for="floatingInputGroup1">Username</label>
                        </div>
                    </div>

                   <div class="input-group mb-3">
                        <span class="input-group-text">🔒︎</span>
                        <div class="form-floating">
                            <input type="password" class="form-control" id="floatingInputGroup2" placeholder="Password">
                            <label for="floatingInputGroup2">Password</label>
                        </div>
                    </div>

                    <small class="forgot mt-0">Forgot Password?</small>

                    <button class="btn btn-primary w-100 mt-3">Continue</button>

                    <p class="signup">
                        New User? <a href="#">Sign up now</a>
                    </p>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
