<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pampeers</title>
    <link rel="icon" type="image/x-icon" href="assets/pampeerlogo.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Ribeye&display=swap" rel="stylesheet">    
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">    

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="createUser.css">
</head>

<body>
    <div class="container-fluid main-container p-0">
    <div class="row align-items-center justify-content-center g-0 min-vh-100">            <!-- RIGHT LOGIN -->
            <div class="col-12 col-md-12 d-flex justify-content-center">
                <div class="login-panel">
                    <div class="d-flex-row d-md-none gap-2 mt-10 mb-3">
                        <img src="assets/pampeerlogo.png" alt="Pampeer Logo" class="logo">
                    </div>
                    <h4>CREATE ACCOUNT</h4>
                    <form class="row g-3">
                        <div class="col-md-12">
                            <label for="inputEmail4" class="form-label">Email</label>
                            <input type="email" class="form-control" id="inputEmail4">
                        </div>
                        <div class="col-md-12">
                            <label for="inputPassword4" class="form-label">Password</label>
                            <input type="password" class="form-control" id="inputPassword4">
                        </div>
                        <div class="col-12">
                            <label for="inputAddress" class="form-label">Address</label>
                            <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
                        </div>
                        <div class="col-12">
                            <label for="inputAddress2" class="form-label">Address 2</label>
                            <input type="text" class="form-control" id="inputAddress2" placeholder="Apartment, studio, or floor">
                        </div>
                        <div class="col-md-6">
                            <label for="inputCity" class="form-label">City</label>
                            <input type="text" class="form-control" id="inputCity">
                        </div>
                        <div class="col-md-4">
                            <label for="inputState" class="form-label">State</label>
                            <select id="inputState" class="form-select">
                            <option selected>Choose...</option>
                            <option>...</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label for="inputZip" class="form-label">Zip</label>
                            <input type="text" class="form-control" id="inputZip">
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">Sign in</button>
                        </div>
                        </form>

                    <p class="signup">
                        New User? <a href="#">Sign up now</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
