<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pampeers - Create Account</title>
    <link rel="icon" type="image/x-icon" href="assets/pampeerlogo.png">

    <link href="https://fonts.googleapis.com/css2?family=Ribeye&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="createUser.css">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="signup-panel">
            <div class="text-center mb-4">
                <img src="assets/pampeerlogo.png" alt="Pampeers Logo" class="logo-img">
                <p class="small text-muted mb-0">Get started with us</p>
                <h1 class="brand-name">Pampeers</h1>
            </div>

            <form class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control">
                    <div class="form-text">Must be 8 characters</div>
                </div>
                <div class="col-12">
                    <label class="form-label">Birthdate</label>
                    <div class="row g-2">
                        <div class="col-4"><input type="text" class="form-control" placeholder="DD"></div>
                        <div class="col-4"><input type="text" class="form-control" placeholder="MM"></div>
                        <div class="col-4"><input type="text" class="form-control" placeholder="YYYY"></div>
                    </div>
                </div>
                <div class="col-12">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Sex</label>
                    <select class="form-select">
                        <option selected disabled>Choose...</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Role</label>
                    <select class="form-select">
                        <option selected disabled>Choose...</option>
                        <option>Guardian</option>
                        <option>Sitter</option>
                    </select>
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary">SIGN UP</button>
                </div>
            </form>

            <p class="login-link">
                Already have an account? <a href="login.html">LOGIN</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
